<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>SecretVault — Sécurité</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root{--bg:#050507;--bg2:#0a0a0f;--card:#12121a;--border:#20202e;--accent:#0099ff;--accent-dark:#0066cc;--red:#ff4d6d;--text:#f0f0f8;--muted:#5a5a78;--green:#7fff6e}
        *{box-sizing:border-box;margin:0;padding:0}
        html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden}
        
        /* Navigation */
        nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(10,10,15,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;padding:10px 0 18px}
        .nav-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:10px;font-weight:600;text-transform:uppercase;transition:all .2s}
        .nav-btn.active{color:var(--accent)}
        .nav-btn svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:2}

        .page{display:none;padding:0 0 100px;min-height:100vh}
        .page.active{display:block}
        
        .header{padding:50px 20px 25px;background:linear-gradient(180deg, var(--bg2) 0%, var(--bg) 100%);border-bottom:1px solid var(--border)}
        .header h1{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:1px;color:var(--accent)}
        
        .section{padding:20px 16px;display:flex;flex-direction:column;gap:15px}
        .card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:20px;position:relative}
        
        /* Inputs */
        .input-group{display:flex;flex-direction:column;gap:8px;margin-bottom:15px}
        .input-group label{font-size:11px;text-transform:uppercase;color:var(--muted);font-weight:700;letter-spacing:1px}
        .input-group input, .input-group textarea, .input-group select{
            background:var(--bg);border:1px solid var(--border);border-radius:12px;color:#fff;
            padding:14px;font-family:'DM Sans',sans-serif;font-size:16px;outline:none;width:100%
        }
        .input-group input:focus{border-color:var(--accent)}

        /* Buttons */
        .btn{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.5px;padding:15px;border-radius:14px;border:none;cursor:pointer;width:100%;transition:0.2s}
        .btn-primary{background:var(--accent);color:#000}
        .btn-secondary{background:var(--border);color:#fff;margin-top:10px}
        .btn-gen{background:rgba(0,153,255,0.1);color:var(--accent);border:1px dashed var(--accent);font-size:14px;margin-bottom:10px}

        /* Liste des secrets */
        .secret-item{display:flex;justify-content:space-between;align-items:center;background:var(--bg2);padding:15px;border-radius:14px;margin-bottom:10px;border:1px solid var(--border)}
        .secret-info h3{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.5px}
        .secret-info p{font-size:12px;color:var(--muted)}
        .secret-content{font-family:monospace;background:rgba(0,0,0,0.3);padding:8px;border-radius:6px;margin-top:8px;color:var(--green);word-break:break-all;display:none}
        .secret-content.visible{display:block}
        
        .badge{font-size:10px;padding:3px 8px;border-radius:6px;background:var(--border);color:var(--muted);text-transform:uppercase}

        /* Toast & Protection */
        .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--accent);color:#000;padding:12px 25px;border-radius:50px;font-weight:700;z-index:1000;transition:0.4s}
        .toast.show{transform:translateX(-50%) translateY(0)}
        
        #lock-screen{position:fixed;inset:0;background:var(--bg);z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px}
        .hidden{display:none !important}
    </style>
</head>
<body>

<div id="toast" class="toast">Message</div>

<div id="lock-screen">
    <h1 style="font-family:'Bebas Neue';font-size:50px;color:var(--accent)">VAULT ACCES</h1>
    <p id="lock-status" style="color:var(--muted);margin-bottom:30px">Veuillez entrer votre code secret</p>
    <div class="input-group" style="width:100%;max-width:300px">
        <input type="password" id="master-pwd" placeholder="••••••" style="text-align:center;font-size:24px;letter-spacing:5px">
    </div>
    <button class="btn btn-primary" onclick="unlockVault()" style="max-width:300px">DÉVERROUILLER</button>
</div>

<div class="page" id="page-list">
    <div class="header"><h1>Mes Secrets</h1><p>Stockage local chiffré AES-256</p></div>
    <div class="section">
        <div class="input-group">
            <select id="filter-cat" onchange="renderSecrets()">
                <option value="all">Toutes les catégories</option>
                <option value="Personnel">Personnel</option>
                <option value="Travail">Travail</option>
                <option value="Jeux">Jeux</option>
                <option value="Corbeille">Corbeille</option>
            </select>
        </div>
        <div id="secrets-container"></div>
    </div>
</div>

<div class="page" id="page-add">
    <div class="header"><h1>Nouveau Secret</h1><p>Ajouter une entrée sécurisée</p></div>
    <div class="section">
        <div class="card">
            <div class="input-group"><label>Titre</label><input type="text" id="add-title" placeholder="Ex: Instagram"></div>
            <div class="input-group"><label>Catégorie</label>
                <select id="add-cat">
                    <option>Personnel</option><option>Travail</option><option>Jeux</option>
                </select>
            </div>
            <div class="input-group"><label>Contenu</label><textarea id="add-content" rows="4" placeholder="Mot de passe ou note..."></textarea></div>
            <button class="btn btn-gen" onclick="generatePass()">🎲 GÉNÉRER UN MOT DE PASSE</button>
            <button class="btn btn-primary" onclick="saveSecret()">ENREGISTRER</button>
            <button class="btn btn-secondary" onclick="showPage('list')">ANNULER</button>
        </div>
    </div>
</div>

<nav id="main-nav" class="hidden">
    <button class="nav-btn active" onclick="showPage('list', this)">
        <svg viewBox="0 0 24 24"><path d="M12 15V17M12 7V11M3.10222 16.0769L11.0022 3.706C11.4391 3.02111 12.5653 3.02111 13.0022 3.706L20.9022 16.0769C21.3655 16.8025 20.8436 17.75 19.9022 17.75H4.10222C3.16086 17.75 2.63894 16.8025 3.10222 16.0769Z" stroke-linecap="round"/></svg>
        Coffre
    </button>
    <button class="nav-btn" onclick="showPage('add', this)">
        <svg viewBox="0 0 24 24"><path d="M12 4V20M4 12H20" stroke-linecap="round"/></svg>
        Ajouter
    </button>
</nav>

<script>
    let masterKey = "";
    let secrets = JSON.parse(localStorage.getItem('vault_data') || "[]");
    let attempts = 0;
    let lockUntil = 0;

    function unlockVault() {
        const pwd = document.getElementById('master-pwd').value;
        const now = Date.now();

        if (now < lockUntil) {
            const wait = Math.ceil((lockUntil - now) / 1000);
            showToast(`Patientez ${wait}s...`);
            return;
        }

        if (pwd === "101225") {
            masterKey = pwd;
            document.getElementById('lock-screen').classList.add('hidden');
            document.getElementById('main-nav').classList.remove('hidden');
            showPage('list');
            renderSecrets();
            attempts = 0;
        } else {
            attempts++;
            document.getElementById('master-pwd').value = "";
            if (attempts >= 3) {
                const penalty = (attempts - 2) * 60 * 1000;
                lockUntil = Date.now() + penalty;
                showToast(`Bloqué ${penalty/60000} min`);
            } else {
                showToast(`Erreur (${3-attempts} essais restants)`);
            }
        }
    }

    function showPage(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        if (btn) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        if (id === 'list') renderSecrets();
    }

    function generatePass() {
        const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";
        let pass = "";
        for (let i = 0; i < 16; i++) pass += chars.charAt(Math.floor(Math.random() * chars.length));
        document.getElementById('add-content').value = pass;
    }

    function saveSecret() {
        const title = document.getElementById('add-title').value;
        const cat = document.getElementById('add-cat').value;
        const content = document.getElementById('add-content').value;

        if (!title || !content) return showToast("Remplissez tout !");

        // Chiffrement AES-256
        const encrypted = CryptoJS.AES.encrypt(content, masterKey).toString();
        
        secrets.push({
            id: Date.now(),
            title,
            cat,
            content: encrypted,
            date: new Date().toLocaleDateString('fr-FR'),
            etat: 'actif'
        });

        localStorage.setItem('vault_data', JSON.stringify(secrets));
        showToast("Sécurisé !");
        document.getElementById('add-title').value = "";
        document.getElementById('add-content').value = "";
        showPage('list');
    }

    function renderSecrets() {
        const container = document.getElementById('secrets-container');
        const filter = document.getElementById('filter-cat').value;
        container.innerHTML = "";

        const filtered = secrets.filter(s => {
            if (filter === 'Corbeille') return s.etat === 'poubelle';
            if (filter === 'all') return s.etat === 'actif';
            return s.etat === 'actif' && s.cat === filter;
        });

        filtered.forEach(s => {
            const div = document.createElement('div');
            div.className = "secret-item";
            div.innerHTML = `
                <div class="secret-info">
                    <h3>${s.title} <span class="badge">${s.cat}</span></h3>
                    <p>Le ${s.date}</p>
                    <div id="content-${s.id}" class="secret-content"></div>
                </div>
                <div style="display:flex; gap:10px">
                    <button onclick="toggleView(${s.id}, '${s.content}')" style="background:none; border:none; font-size:20px">👁️</button>
                    <button onclick="toggleStatus(${s.id})" style="background:none; border:none; font-size:20px">${s.etat === 'actif' ? '🗑️' : '🔄'}</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function toggleView(id, encrypted) {
        const el = document.getElementById('content-' + id);
        if (el.classList.contains('visible')) {
            el.classList.remove('visible');
        } else {
            const decrypted = CryptoJS.AES.decrypt(encrypted, masterKey).toString(CryptoJS.enc.Utf8);
            el.textContent = decrypted;
            el.classList.add('visible');
        }
    }

    function toggleStatus(id) {
        const idx = secrets.findIndex(s => s.id === id);
        secrets[idx].etat = secrets[idx].etat === 'actif' ? 'poubelle' : 'actif';
        localStorage.setItem('vault_data', JSON.stringify(secrets));
        renderSecrets();
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }
</script>
</body>
</html>
